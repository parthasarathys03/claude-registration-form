<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Review — Claude Code Meetup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF7F3;
      color: #1C1917;
      min-height: 100vh;
      padding: 36px 32px 60px;
    }

    /* ── Top bar ── */
    .top {
      max-width: 1400px;
      margin: 0 auto 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .top-left h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1C1917;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      background: #FDF0EA;
      color: #A8513A;
      font-size: 12px;
      font-weight: 700;
      border-radius: 100px;
      padding: 2px 10px;
      border: 1px solid rgba(204,120,92,0.25);
    }

    .meta { font-size: 13px; color: #78716C; margin-top: 4px; }

    .actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: filter 0.18s, opacity 0.18s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(160deg, #D4845F 0%, #BC6040 100%);
      color: #fff;
      box-shadow: 0 2px 10px rgba(188,96,64,0.25);
    }
    .btn-outline {
      background: #FFFCF9;
      color: #57534E;
      border: 1.5px solid #EDE8E1;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.07); }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Card ── */
    .card {
      max-width: 1400px;
      margin: 0 auto;
      background: #FFFCF9;
      border: 1px solid #EDE8E1;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(204,120,92,0.07);
      overflow: hidden;
    }

    /* ── States ── */
    .empty, .loading, .error {
      text-align: center;
      padding: 72px 24px;
      color: #A8A29E;
      font-size: 15px;
    }
    .loading::before { content: "Loading…"; }
    .error { color: #C4603F; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: #FDF9F6;
      border-bottom: 2px solid #EDE8E1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #A8A29E;
      white-space: nowrap;
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid #F3EDE6;
      color: #292524;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FDF7F4; }

    /* Column-specific widths */
    .col-ts   { min-width: 140px; white-space: nowrap; }
    .col-name { min-width: 90px;  white-space: nowrap; }
    .col-email { min-width: 190px; white-space: nowrap; }
    .col-exp  { min-width: 160px; }
    .col-role { min-width: 100px; white-space: nowrap; }
    .col-ws   { min-width: 90px;  white-space: nowrap; }
    .col-size { min-width: 90px;  white-space: nowrap; }
    .col-interests { min-width: 140px; }
    .col-li   { min-width: 130px; }
    .col-gh   { min-width: 100px; white-space: nowrap; }
    .col-si   { min-width: 160px; }
    .col-bool { min-width: 70px;  text-align: center; }

    td.col-bool { text-align: center; }
    th.col-bool { text-align: center; }

    .badge-yes {
      display: inline-block;
      background: #D1FAE5;
      color: #065F46;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 100px;
    }

    .link-val {
      color: #CC785C;
      text-decoration: none;
      word-break: break-all;
    }
    .link-val:hover { text-decoration: underline; }

    .muted { color: #C7C0B8; }

    @media (max-width: 700px) {
      body { padding: 20px 12px 48px; }
      .top { flex-direction: column; }
      .btn { padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="top">
  <div class="top-left">
    <h1>Registrations <span class="count-badge" id="count-badge" style="display:none"></span></h1>
    <div class="meta" id="meta">Claude Code Meetup · Loading…</div>
  </div>
  <div class="actions">
    <button class="btn btn-outline" onclick="loadData()">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
      Refresh
    </button>
    <button class="btn btn-primary" id="dl-btn" onclick="downloadCSV()" disabled>
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      Download CSV
    </button>
  </div>
</div>

<div class="card">
  <div id="content" class="loading"></div>
</div>

<script>
  const API = 'https://api.github.com/repos/parthasarathys03/claude-registration-form/contents/data/submissions.json';

  const COLS = [
    { key: '_timestamp',                   label: 'Submitted At',        cls: 'col-ts'   },
    { key: 'First Name',                   label: 'First Name',          cls: 'col-name' },
    { key: 'Last Name',                    label: 'Last Name',           cls: 'col-name' },
    { key: 'Email',                        label: 'Email',               cls: 'col-email'},
    { key: 'Claude Code Experience Level', label: 'Experience',          cls: 'col-exp'  },
    { key: 'Role',                         label: 'Role',                cls: 'col-role' },
    { key: 'Work or Study',                label: 'Work / Study',        cls: 'col-ws'   },
    { key: 'Company Size',                 label: 'Company Size',        cls: 'col-size' },
    { key: 'Interested Features',          label: 'Interests',           cls: 'col-interests'},
    { key: 'LinkedIn Profile',             label: 'LinkedIn',            cls: 'col-li'   },
    { key: 'GitHub Username',              label: 'GitHub',              cls: 'col-gh'   },
    { key: 'Something Interesting',        label: 'Something Interesting',cls: 'col-si'  },
    { key: 'Agree to Event Terms',         label: 'Terms',               cls: 'col-bool' },
    { key: 'Newsletter Signup',            label: 'Newsletter',          cls: 'col-bool' },
    { key: 'Speaker Interest',             label: 'Speaker',             cls: 'col-bool' },
  ];

  let allData = [];

  async function loadData() {
    const el = document.getElementById('content');
    el.className = 'loading';
    el.textContent = '';
    document.getElementById('dl-btn').disabled = true;
    const badge = document.getElementById('count-badge');
    badge.style.display = 'none';
    document.getElementById('meta').textContent = 'Claude Code Meetup · Loading…';

    try {
      const res = await fetch(API, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (!res.ok) throw new Error('Could not load submissions (' + res.status + ')');
      const file = await res.json();
      allData = JSON.parse(atob(file.content.replace(/\n/g, '')));
      render(allData);
    } catch (err) {
      el.className = 'error';
      el.textContent = 'Error: ' + err.message;
    }
  }

  function fmt(col, val) {
    if (!val) return '<span class="muted">—</span>';
    if (val === 'Yes') return '<span class="badge-yes">Yes</span>';
    if (col.key === '_timestamp') return new Date(val).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
    if (col.key === 'LinkedIn Profile') return `<a class="link-val" href="${val}" target="_blank" rel="noopener">${val}</a>`;
    return String(val).replace(/</g, '&lt;');
  }

  function render(data) {
    const el = document.getElementById('content');
    const badge = document.getElementById('count-badge');
    const meta  = document.getElementById('meta');

    badge.textContent = data.length + ' total';
    badge.style.display = '';

    if (!data.length) {
      meta.textContent = 'No submissions yet';
      el.className = 'empty';
      el.textContent = 'No registrations yet. Submissions will appear here automatically.';
      return;
    }

    const last = [...data].sort((a,b) => new Date(b._timestamp) - new Date(a._timestamp))[0];
    meta.textContent = 'Last submitted: ' + new Date(last._timestamp).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

    el.className = 'table-wrap';
    el.innerHTML = `
      <table>
        <thead>
          <tr>${COLS.map(c => `<th class="${c.cls}">${c.label}</th>`).join('')}</tr>
        </thead>
        <tbody>
          ${[...data].reverse().map(row =>
            `<tr>${COLS.map(c => `<td class="${c.cls}">${fmt(c, row[c.key])}</td>`).join('')}</tr>`
          ).join('')}
        </tbody>
      </table>`;

    document.getElementById('dl-btn').disabled = false;
  }

  function downloadCSV() {
    const headers = COLS.map(c => c.label);
    const rows = allData.map(row =>
      COLS.map(c => `"${String(row[c.key] || '').replace(/"/g, '""')}"`)
    );
    const csv = [headers.map(h => `"${h}"`), ...rows].map(r => r.join(',')).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), {
      href: url,
      download: `registrations-${new Date().toISOString().slice(0,10)}.csv`
    });
    a.click();
    URL.revokeObjectURL(url);
  }

  loadData();
</script>
</body>
</html>
