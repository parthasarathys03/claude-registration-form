<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Received — Claude Code Meetup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAF7F3;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(204,120,92,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(204,120,92,0.07) 0%, transparent 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: #1C1917;
    }

    .card {
      background: #FFFCF9;
      border-radius: 20px;
      border: 1px solid #EDE8E1;
      box-shadow: 0 2px 8px rgba(28,25,23,0.06), 0 12px 40px rgba(204,120,92,0.07);
      width: 100%;
      max-width: 480px;
      padding: 52px 44px;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #FDF0EA;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      border: 1px solid rgba(204,120,92,0.2);
    }

    .icon svg { width: 30px; height: 30px; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1C1917;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 14.5px;
      color: #78716C;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #D4845F, #BC6040);
      border-radius: 2px;
      margin: 24px auto;
    }

    .detail {
      background: #FDF9F6;
      border: 1px solid #EDE8E1;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #57534E;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(160deg, #D4845F 0%, #BC6040 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(188,96,64,0.28);
      transition: filter 0.18s;
    }
    .back-btn:hover { filter: brightness(1.07); }
  </style>
</head>
<body>
<div class="card">

  <div class="icon">
    <!-- Checkmark -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="#CC785C" opacity="0.15"/>
      <path d="M7 12.5l3.5 3.5 6.5-7" stroke="#CC785C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>You're registered!</h1>
  <p>Thanks for signing up for the <strong>Claude Code Community Meetup</strong>.</p>
  <p>We've received your details and will be in touch soon.</p>

  <div class="divider"></div>

  <div class="detail">
    A confirmation has been sent to your email. Keep an eye on your inbox for event updates and next steps.
  </div>

  <a href="index.html" class="back-btn">← Back to Form</a>

</div>
</body>
</html>
